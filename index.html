<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <title>Thiệp Cưới</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FEF0E0;
            overflow: hidden;
            perspective: 1200px;
            font-family: 'Montserrat', sans-serif;
        }

        /* CARD TRANG ĐẦU */
        .card {
            width: 90%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, .15);
            text-align: center;
            padding: 40px 20px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: absolute;
            z-index: 5;
            box-sizing: border-box;
        }

        .card.flip {
            transform: rotateY(90deg) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        .names {
            margin-bottom: 20px;
        }

        .names span {
            display: inline-block;
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #d6206a;
            line-height: 1.2;
        }

        .names em {
            font-family: 'Great Vibes', cursive;
            font-size: 2rem;
            color: #ff7bac;
            font-style: normal;
            margin: 0 10px;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1rem;
            color: #888;
        }

        p {
            font-weight: 300;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .button-link {
            display: inline-block;
            padding: 14px 28px;
            background: #ff7bac;
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 123, 172, 0.4);
            transition: 0.3s;
        }

        /* PHONG BÌ (ENVELOPE) - ĐÃ FIX KÍCH THƯỚC */
        .envelope {
            position: relative;
            width: 90%;
            max-width: 440px;
            /* Rộng hơn card một chút */
            height: 300px;
            /* Tăng chiều cao để chứa thư tốt hơn */
            background: #eed1be;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .envelope.show {
            opacity: 1;
            transform: scale(1);
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #e4af93;
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 3;
            /* Nắp nằm trên thư */
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
            /* Mở ra thì nằm sau thư */
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f6d6c2;
            clip-path: polygon(0 35%, 50% 65%, 100% 35%, 100% 100%, 0 100%);
            z-index: 4;
            /* Mặt trước luôn nằm trên cùng */
        }

        /* LÁ THƯ (LETTER) - NẰM GỌN TRONG PHONG BÌ */
        .letter {
            position: absolute;
            width: 92%;
            /* Nhỏ hơn chiều rộng phong bì */
            height: 230px;
            /* Thấp hơn chiều cao phong bì để không bị lòi */
            background: white;
            left: 4%;
            bottom: 10px;
            /* Đẩy sâu xuống đáy phong bì */
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            /* Nằm giữa flap và envelope-front */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1);

            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #d6206a;
            text-align: center;
            line-height: 1.4;
        }

        /* Khi thư trồi lên */
        .envelope.showLetter .letter {
            transform: translateY(-160px);
            /* Đẩy lên vừa tầm mắt */
        }

        /* HIỆU ỨNG TIM & KIM TUYẾN */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            color: #ff4d79;
        }

        .glitter-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .glitter {
            position: absolute;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="glitter-container" id="glitterContainer"></div>

    <div class="card" id="card">
        <h2>Save the Date</h2>
        <div class="names">
            <span>Tường Vy</span>
            <em>&</em>
            <span>Gia Bảo</span>
        </div>
        <p>Trân trọng kính mời bạn đến dự buổi tiệc của chúng mình</p>
        <a href="#" class="button-link" id="openBtn">Mở thiệp cưới</a>
    </div>

    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">
            Happy Wedding <br><br>

            Tường Vy ❤️ Gia Bảo
        </div>
        <div class="envelope-front"></div>
    </div>

    <div class="hearts" id="hearts"></div>

    <script>
        const openBtn = document.getElementById("openBtn");
        const card = document.getElementById("card");
        const envelope = document.getElementById("envelope");
        const heartsContainer = document.getElementById("hearts");
        const glitterContainer = document.getElementById("glitterContainer");

        // 1. Hiệu ứng Kim Tuyến
        const colors = ['#FFD700', '#FFC0CB', '#FFFFFF', '#FFE4E1', '#FF69B4'];
        function createSingleGlitter() {
            const glitter = document.createElement("div");
            glitter.className = "glitter";
            const size = Math.random() * 5 + 3;
            glitter.style.width = size + "px";
            glitter.style.height = size + "px";
            glitter.style.left = Math.random() * 100 + "vw";
            glitter.style.background = colors[Math.floor(Math.random() * colors.length)];
            glitter.style.animationDuration = (Math.random() * 4 + 4) + "s";
            glitterContainer.appendChild(glitter);
            glitter.addEventListener('animationend', () => {
                glitter.remove();
                createSingleGlitter();
            });
        }

        for (let i = 0; i < 40; i++) {
            setTimeout(createSingleGlitter, i * 150);
        }

        // 2. Xử lý mở thiệp
        openBtn.onclick = (e) => {
            e.preventDefault();
            createHearts(e);

            card.classList.add("flip");

            setTimeout(() => envelope.classList.add("show"), 600);
            setTimeout(() => envelope.classList.add("open"), 1500);
            setTimeout(() => envelope.classList.add("showLetter"), 2200);

            // Chuyển trang sau khi xem thiệp
            setTimeout(() => {
                window.location.href = "home.html";
            }, 5500);
        }

        // 3. Hiệu ứng nổ tim
        function createHearts(e) {
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement("div");
                heart.className = "heart";
                heart.innerHTML = "❤";
                heart.style.left = e.clientX + "px";
                heart.style.top = e.clientY + "px";
                heartsContainer.appendChild(heart);

                const angle = Math.random() * Math.PI * 2;
                const radius = 70 + Math.random() * 50;
                const tx = Math.cos(angle) * radius;
                const ty = Math.sin(angle) * radius - 40;

                heart.animate([
                    { transform: "translate(0,0) scale(0.5)", opacity: 1 },
                    { transform: `translate(${tx}px,${ty}px) scale(1.2)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' });

                setTimeout(() => heart.remove(), 1000);
            }
        }
    </script>
</body>

</html>
